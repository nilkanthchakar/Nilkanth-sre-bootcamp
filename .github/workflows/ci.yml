name: CI Pipeline

on:
  push:
    paths:
      - 'src/**'
      - 'pom.xml'
      - 'Dockerfile'
      - 'Makefile'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'pom.xml'
      - 'Dockerfile'
      - 'Makefile'
      - '.github/workflows/ci.yml'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  ci:
    name: Build, Test, Scan, and Push
    runs-on: [self-hosted]

    env:
      IMAGE_NAME: student-api
      IMAGE_VERSION: 0.1.0
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      IMAGE_TAG: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/student-api:0.1.0

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build API
        id: build
        continue-on-error: true
        run: make build

      - name: Run tests
        id: tests
        continue-on-error: true
        run: make test

      - name: Run code linting
        id: lint
        continue-on-error: true
        run: make lint

      - name: Run vulnerability scan
        id: vuln
        continue-on-error: true
        run: |
          mvn -B org.owasp:dependency-check-maven:check -DfailBuildOnCVSS=7 -DskipTests -Dformat=ALL

      - name: Generate quality score
        id: quality_score
        if: always()
        env:
          BUILD_STEP: ${{ steps.build.outcome }}
          TEST_STEP: ${{ steps.tests.outcome }}
          LINT_STEP: ${{ steps.lint.outcome }}
          VULN_STEP: ${{ steps.vuln.outcome }}
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          build_ok = os.getenv("BUILD_STEP") == "success"
          test_ok = os.getenv("TEST_STEP") == "success"
          lint_ok = os.getenv("LINT_STEP") == "success"
          vuln_ok = os.getenv("VULN_STEP") == "success"

          severity_counts = {"CRITICAL": 0, "HIGH": 0, "MEDIUM": 0, "LOW": 0}
          report = Path("target/dependency-check-report.xml")
          if report.exists():
              content = report.read_text(encoding="utf-8", errors="ignore")
              for severity in severity_counts:
                  severity_counts[severity] = len(re.findall(rf"<severity>{severity}</severity>", content, flags=re.IGNORECASE))

          total_vulns = sum(severity_counts.values())

          score = 0
          if build_ok:
              score += 20
          if test_ok:
              score += 30

          if lint_ok:
              score += 20
          if vuln_ok:
              score += 30
          else:
              penalty = severity_counts["CRITICAL"] * 10 + severity_counts["HIGH"] * 6 + severity_counts["MEDIUM"] * 3 + severity_counts["LOW"] * 1
              score += max(0, 30 - penalty)

          summary_lines = [
              "# Quality Summary",
              "",
              f"- Build: {'passed' if build_ok else 'failed'}",
              f"- Tests: {'passed' if test_ok else 'failed'}",
              f"- Lint: {'passed' if lint_ok else 'failed'}",
              f"- Vulnerability scan: {'passed' if vuln_ok else 'failed'}",
              f"- Vulnerabilities found: {total_vulns} (Critical: {severity_counts['CRITICAL']}, High: {severity_counts['HIGH']}, Medium: {severity_counts['MEDIUM']}, Low: {severity_counts['LOW']})",
              f"- Overall quality score: {score}/100",
          ]
          summary = "\n".join(summary_lines)

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as fh:
              fh.write(summary)

          print(summary)
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"quality_score={score}\n")

      - name: Enforce non-regression quality gate
        if: always()
        env:
          CURRENT_SCORE: ${{ steps.quality_score.outputs.quality_score }}
        run: |
          python - <<'PY'
          import os
          import pathlib

          current_score = int(os.getenv("CURRENT_SCORE", "0"))
          baseline_file = pathlib.Path(".quality-baseline")

          if baseline_file.exists():
              baseline_score = int(baseline_file.read_text(encoding="utf-8").strip())
              print(f"Current score: {current_score}")
              print(f"Baseline score: {baseline_score}")
              if current_score < baseline_score:
                  raise SystemExit(f"Quality regression: {current_score} is below baseline {baseline_score}")
              baseline_file.write_text(str(current_score), encoding="utf-8")
          else:
              print("No baseline file found. Creating one from the current score.")
              baseline_file.write_text(str(current_score), encoding="utf-8")

          print("Quality gate passed: score is equal to or better than the baseline.")
          PY
      - name: Upload vulnerability report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: target/dependency-check-report.*

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build --build-arg JAR_FILE=target/${IMAGE_NAME}-${IMAGE_VERSION}.jar -t ${IMAGE_TAG} .

      - name: Push Docker image
        run: docker push ${IMAGE_TAG}
