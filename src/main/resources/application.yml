spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://student-db:5432/studentdb}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
      jakarta.persistence.jdbc.url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://student-db:5432/studentdb}
      jakarta.persistence.jdbc.user: ${SPRING_DATASOURCE_USERNAME:postgres}
      jakarta.persistence.jdbc.password: ${SPRING_DATASOURCE_PASSWORD:}
      jakarta.persistence.jdbc.driver: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health, info
  health:
    db:
      enabled: true
