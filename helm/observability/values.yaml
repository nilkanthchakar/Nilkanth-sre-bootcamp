namespace: observability

# Node selector: the node that hosts dependent services should be labeled accordingly.
nodeSelector:
  dependent_services: "true"

images:
  prometheus: prom/prometheus:v2.44.0
  grafana: grafana/grafana:9.5.2
  loki: grafana/loki:2.8.2
  promtail: grafana/promtail:2.8.2
  # Official multi-architecture images. These work on the ARM64 Minikube nodes.
  nodeExporter: quay.io/prometheus/node-exporter:v1.12.1-distroless
  kubeStateMetrics: registry.k8s.io/kube-state-metrics/kube-state-metrics:v2.19.1
  postgresExporter: wrouesnel/postgres_exporter:v0.8.0
  blackboxExporter: prom/blackbox-exporter:v0.25.0

applicationNamespace: student-api
applicationServiceName: student-api
applicationMetricsPath: /actuator/prometheus

blackbox:
  targets:
    - name: student-api
      url: http://student-api.student-api.svc.cluster.local:8080/actuator/health
    - name: grafana
      url: http://grafana.observability.svc.cluster.local:3000/api/health
    - name: prometheus
      url: http://prometheus.observability.svc.cluster.local:9090/-/ready

alerts:
  cpuUtilizationThreshold: 85
  diskUtilizationThreshold: 85
  errorRateThreshold: 0.05
  requestCountThreshold: 500
  latencyThresholdSeconds:
    p90: 0.5
    p95: 1.0
    p99: 2.0
  restartWindow: 10m
  databaseRestart:
    namespace: student-api
    podRegex: student-db-.*
  vaultRestart:
    namespace: vault
    podRegex: vault-.*
  argocdRestart:
    namespace: argocd
    podRegex: argocd-.*

# PostgreSQL exporter connection. For production, provide an existing Secret instead
# of keeping credentials in this development chart values file.
postgres:
  existingSecret: ""
  secretName: pg-exporter-creds
  dataSourceName: postgresql://postgres:mysecretpassword@student-db.student-api.svc.cluster.local:5432/studentdb?sslmode=disable

# If you prefer the Prometheus Operator / kube-prometheus-stack, set this to true
# to disable the chart's built-in Prometheus, node-exporter, kube-state-metrics
# and blackbox-exporter resources to avoid conflicts. Install the operator
# separately and configure it according to your needs.
useKubePrometheusStack: false
