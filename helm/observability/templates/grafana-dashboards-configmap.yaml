apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: {{ .Values.namespace }}
data:
  node-metrics.json: |
    {
      "uid": "node-metrics",
      "title": "Node Metrics",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "30s",
      "panels": [
        {
          "id": 1,
          "type": "timeseries",
          "title": "CPU Utilization %",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "targets": [
            {
              "refId": "A",
              "expr": "100 * (1 - avg by (instance) (rate(node_cpu_seconds_total{mode=\"idle\"}[5m])))"
            }
          ]
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "Memory Utilization %",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "targets": [
            {
              "refId": "A",
              "expr": "100 * (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes))"
            }
          ]
        },
        {
          "id": 3,
          "type": "timeseries",
          "title": "Disk Utilization %",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "targets": [
            {
              "refId": "A",
              "expr": "100 * (1 - (node_filesystem_avail_bytes{fstype!~\"tmpfs|squashfs|overlay\",mountpoint!~\"/(run|var/lib/kubelet).*\"} / node_filesystem_size_bytes{fstype!~\"tmpfs|squashfs|overlay\",mountpoint!~\"/(run|var/lib/kubelet).*\"}))"
            }
          ]
        },
        {
          "id": 4,
          "type": "timeseries",
          "title": "Load Average",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "targets": [
            {
              "refId": "A",
              "expr": "node_load1"
            }
          ]
        }
      ]
    }

  db-metrics.json: |
    {
      "uid": "db-metrics",
      "title": "DB Metrics",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "30s",
      "panels": [
        {
          "id": 1,
          "type": "timeseries",
          "title": "DB Up",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "targets": [
            {
              "refId": "A",
              "expr": "pg_up"
            }
          ]
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "Active Connections",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "targets": [
            {
              "refId": "A",
              "expr": "pg_stat_database_numbackends"
            }
          ]
        },
        {
          "id": 3,
          "type": "timeseries",
          "title": "Transactions / sec",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "targets": [
            {
              "refId": "A",
              "expr": "rate(pg_stat_database_xact_commit[5m]) + rate(pg_stat_database_xact_rollback[5m])"
            }
          ]
        },
        {
          "id": 4,
          "type": "timeseries",
          "title": "Cache Hit Ratio",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(rate(pg_stat_database_blks_hit[5m])) / clamp_min(sum(rate(pg_stat_database_blks_hit[5m])) + sum(rate(pg_stat_database_blks_read[5m])), 1)"
            }
          ]
        }
      ]
    }

  application-error-logs.json: |
    {
      "uid": "application-error-logs",
      "title": "Application Error Logs",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "30s",
      "panels": [
        {
          "id": 1,
          "type": "logs",
          "title": "Student API Logs",
          "datasource": { "type": "loki", "uid": "loki" },
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 0 },
          "targets": [
            {
              "refId": "A",
              "expr": "{namespace=\"student-api\", app=\"student-api\"}"
            }
          ]
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "Error Logs / 5m",
          "datasource": { "type": "loki", "uid": "loki" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 10 },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(count_over_time({namespace=\"student-api\", app=\"student-api\"} |= \"ERROR\" [5m]))"
            }
          ]
        },
        {
          "id": 3,
          "type": "timeseries",
          "title": "Exceptions / 5m",
          "datasource": { "type": "loki", "uid": "loki" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 10 },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(count_over_time({namespace=\"student-api\", app=\"student-api\"} |= \"Exception\" [5m]))"
            }
          ]
        }
      ]
    }

  kube-state-metrics.json: |
    {
      "uid": "kube-state-metrics",
      "title": "Kube-State Metrics",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "30s",
      "panels": [
        {
          "id": 1,
          "type": "timeseries",
          "title": "Deployments Desired vs Available",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "targets": [
            {
              "refId": "A",
              "expr": "kube_deployment_spec_replicas"
            },
            {
              "refId": "B",
              "expr": "kube_deployment_status_replicas_available"
            }
          ]
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "Pod Restarts",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (namespace, pod) (rate(kube_pod_container_status_restarts_total[5m]))"
            }
          ]
        },
        {
          "id": 3,
          "type": "timeseries",
          "title": "Pod Phases",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (phase) (kube_pod_status_phase)"
            }
          ]
        },
        {
          "id": 4,
          "type": "timeseries",
          "title": "Nodes Ready",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "targets": [
            {
              "refId": "A",
              "expr": "kube_node_status_condition{condition=\"Ready\", status=\"true\"}"
            }
          ]
        }
      ]
    }

  blackbox-metrics.json: |
    {
      "uid": "blackbox-metrics",
      "title": "Blackbox Metrics",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "30s",
      "panels": [
        {
          "id": 1,
          "type": "timeseries",
          "title": "Probe Success",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "targets": [
            {
              "refId": "A",
              "expr": "probe_success"
            }
          ]
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "Probe Duration (s)",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "targets": [
            {
              "refId": "A",
              "expr": "probe_duration_seconds"
            }
          ]
        },
        {
          "id": 3,
          "type": "timeseries",
          "title": "HTTP Status Code",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 8 },
          "targets": [
            {
              "refId": "A",
              "expr": "probe_http_status_code"
            }
          ]
        }
      ]
    }
