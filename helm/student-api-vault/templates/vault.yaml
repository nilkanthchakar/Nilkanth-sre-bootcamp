apiVersion: apps/v1
kind: Deployment
metadata:
  name: vault
  namespace: {{ .Values.namespaces.vault }}
  labels:
    app: vault
spec:
  replicas: {{ .Values.vault.replicaCount }}
  selector:
    matchLabels:
      app: vault
  template:
    metadata:
      labels:
        app: vault
    spec:
      nodeSelector:
{{ toYaml .Values.vault.nodeSelector | nindent 8 }}
      containers:
        - name: vault
          image: {{ .Values.vault.image }}
          ports:
            - containerPort: 8200
          env:
            - name: VAULT_DEV_ROOT_TOKEN_ID
              value: {{ .Values.vault.rootToken | quote }}
            - name: VAULT_DEV_LISTEN_ADDRESS
              value: "0.0.0.0:8200"
          volumeMounts:
            - name: vault-data
              mountPath: /vault/data
      volumes:
        - name: vault-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: vault
  namespace: {{ .Values.namespaces.vault }}
spec:
  type: {{ .Values.vault.service.type }}
  selector:
    app: vault
  ports:
    - port: {{ .Values.vault.service.port }}
      targetPort: 8200
      protocol: TCP
      name: http
