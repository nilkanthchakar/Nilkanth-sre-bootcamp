apiVersion: apps/v1
kind: Deployment
metadata:
  name: student-api
  namespace: student-api
  labels:
    app: student-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: student-api
  template:
    metadata:
      labels:
        app: student-api
    spec:
      nodeSelector:
        type: application
      initContainers:
        - name: migrate
          image: postgres:16
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: student-db-credentials
          command:
            - sh
            - -c
            - |
              until pg_isready -h student-db -p 5432; do echo "waiting for db"; sleep 1; done
              PGPASSWORD="$POSTGRES_PASSWORD" psql -h student-db -U "$POSTGRES_USER" -d "$POSTGRES_DB" -f /migrations/V1__create_students_table.sql
          volumeMounts:
            - name: migrations
              mountPath: /migrations
      containers:
        - name: student-api
          image: student-api:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://student-db:5432/studentdb"
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: student-db-credentials
                  key: POSTGRES_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: student-db-credentials
                  key: POSTGRES_PASSWORD
            - name: SPRING_FLYWAY_ENABLED
              value: "false"
            - name: SERVER_PORT
              value: "8080"
          envFrom:
            - secretRef:
                name: student-db-credentials
      volumes:
        - name: migrations
          configMap:
            name: student-db-migrations

---
apiVersion: v1
kind: Service
metadata:
  name: student-api
  namespace: student-api
  labels:
    app: student-api
spec:
  type: ClusterIP
  selector:
    app: student-api
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http