apiVersion: batch/v1
kind: Job
metadata:
  name: vault-seed-db-credentials
  namespace: vault
spec:
  template:
    spec:
      containers:
        - name: seed
          image: curlimages/curl:8.1.2
          command:
            - sh
            - -c
            - |
              set -e
              echo "Seeding Vault with DB credentials"
              curl --fail -s -X POST \
                -H "X-Vault-Token: root" \
                -H "Content-Type: application/json" \
                --data '{"data": {"username":"postgres","password":"mysecretpassword"}}' \
                http://vault.vault.svc.cluster.local:8200/v1/secret/data/student-api/db-credentials
      restartPolicy: OnFailure
  backoffLimit: 4
