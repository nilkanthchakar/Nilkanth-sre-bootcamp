apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-agent-config
  namespace: student-api
data:
  vault-agent.hcl: |-
    pid_file = "/tmp/vault-agent-pid"

    auto_auth {
      method "kubernetes" {
        mount_path = "auth/kubernetes"
        config = {
          role = "student-api"
        }
      }

      sink "file" {
        config = {
          path = "/vault/secrets/creds.env"
        }
      }
    }

    vault {
      address = "http://vault.vault.svc.cluster.local:8200"
    }

    template {
      destination = "/vault/secrets/creds.env"
      contents = <<EOH
{{ with secret "secret/data/student-api/db-credentials" }}
SPRING_DATASOURCE_USERNAME={{ .Data.data.username }}
SPRING_DATASOURCE_PASSWORD={{ .Data.data.password }}
SPRING_DATASOURCE_URL=jdbc:postgresql://student-db:5432/studentdb
{{ end }}
EOH
    }
