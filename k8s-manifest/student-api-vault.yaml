apiVersion: apps/v1
kind: Deployment
metadata:
  name: student-api
  namespace: student-api
  labels:
    app: student-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: student-api
  template:
    metadata:
      labels:
        app: student-api
    spec:
      nodeSelector:
        type: application
      serviceAccountName: student-api-sa
      # Migrations are handled by a dedicated Job which authenticates to Vault
      containers:
        - name: student-api
          image: student-api:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_FLYWAY_ENABLED
              value: "false"
            - name: SERVER_PORT
              value: "8080"
          volumeMounts:
            - name: migrations
              mountPath: /migrations
            - name: vault-secrets
              mountPath: /vault/secrets
        - name: vault-agent
          image: hashicorp/vault:1.15.3
          imagePullPolicy: IfNotPresent
          args:
            - "agent"
            - "-config=/vault/config/vault-agent.hcl"
          env:
            - name: VAULT_ADDR
              value: "http://vault.vault.svc.cluster.local:8200"
          volumeMounts:
            - name: vault-config
              mountPath: /vault/config
            - name: vault-secrets
              mountPath: /vault/secrets
      volumes:
        - name: migrations
          configMap:
            name: student-db-migrations
        - name: vault-secrets
          emptyDir: {}
        - name: vault-config
          configMap:
            name: vault-agent-config
        
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: student-api-sa
  namespace: student-api
---
apiVersion: v1
kind: Service
metadata:
  name: student-api
  namespace: student-api
  labels:
    app: student-api
spec:
  type: ClusterIP
  selector:
    app: student-api
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
